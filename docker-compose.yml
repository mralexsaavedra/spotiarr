networks:
  spotiarr-network:
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    container_name: spotiarr-redis
    restart: unless-stopped
    networks:
      - spotiarr-network
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  spotiarr:
    image: mralexandersaavedra/spotiarr:latest
    container_name: spotiarr
    restart: unless-stopped
    networks:
      - spotiarr-network
    ports:
      - "3000:3000"
    volumes:
      - ./config:/spotiarr/dist/backend/config
      - ./downloads:/spotiarr/dist/backend/downloads
    env_file:
      - .env
    environment:
      # Override for Docker
      - REDIS_HOST=redis
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
    driver: local
