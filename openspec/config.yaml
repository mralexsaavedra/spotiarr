project:
  name: spotiarr
  path: /Users/mralexsaavedra/Developer/spotiarr
  stack:
    backend: Node.js 22 + Express + Prisma (SQLite) + BullMQ + Redis + Zod
    frontend: React 19 + Vite + TanStack Query + Zustand + Tailwind CSS 4
    shared: TypeScript shared package (@spotiarr/shared)

sdd:
  artifact_store: openspec
  strict_tdd: true
  phase_rules:
    - proposal_before_spec
    - spec_before_design
    - design_before_tasks
    - tasks_before_apply
    - apply_before_verify
    - no_phase_skips_without_explicit_approval

testing:
  framework: vitest
  strategy: workspace-targeted-first
  commands:
    frontend:
      lint: pnpm --filter frontend run lint
      test: pnpm --filter frontend run test:run
      build: pnpm --filter frontend run build
    backend:
      lint: pnpm --filter backend run lint
      test: pnpm --filter backend run test:run
      build: pnpm --filter backend run build
    shared:
      lint: pnpm --filter @spotiarr/shared run lint
      build: pnpm --filter @spotiarr/shared run build
    cross_workspace:
      lint: pnpm lint
      test: pnpm test
      build: pnpm build
