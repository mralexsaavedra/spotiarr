<a class="flex justify-between items-center px-5 py-3 border-b dark:border-spotify-gray-dark hover:bg-gray-100 dark:hover:bg-spotify-gray-dark transition-all group" *ngFor="let track of tracks$ | async">
  <div class="flex items-center gap-3 dark:text-white">
    <span class="font-medium"><span class="text-spotify-gray-light">{{ track.artist }}</span> <span class="text-black dark:text-white">{{ track.name }}</span></span>
    <a [href]="track.spotifyUrl"
       target="_blank"
       class="text-spotify-green hover:text-spotify-green-light hover:scale-110 transition-all" title="Preview on Spotify">
      <i class="fa-brands fa-spotify"></i>
    </a>
    <a [href]="track.youtubeUrl"
       target="_blank"
       class="text-red-500 hover:text-red-600 hover:scale-110 transition-all" title="View on YouTube">
      <i class="fa-brands fa-youtube"></i>
    </a>
    <a *ngIf="track.status === trackStatuses.Completed"
       href="api/track/download/{{track.id}}"
       class="text-blue-500 hover:text-blue-600 hover:scale-110 transition-all"
       title="Download file"
       download>
      <i class="fa-solid fa-download"></i>
    </a>
  </div>
  <div class="flex items-center gap-3">
    <i *ngIf="track.status === trackStatuses.Error" class="fa-solid fa-repeat cursor-pointer hover:text-spotify-green hover:scale-110 transition-all text-spotify-gray-light" title="Retry download" (click)="retry(track.id)"></i>
    <i class="fa-solid fa-xmark cursor-pointer hover:text-red-500 hover:scale-110 transition-all text-spotify-gray-light opacity-0 group-hover:opacity-100" title="Remove track" (click)="delete(track.id)"></i>
    <ng-container [ngSwitch]="track.status">
      <span *ngSwitchCase="trackStatuses.New" class="inline-block px-3 py-1 text-xs font-bold rounded-full bg-blue-500/20 text-blue-400 border border-blue-500/30">NEW</span>
      <span *ngSwitchCase="trackStatuses.Searching" class="inline-block px-3 py-1 text-xs font-bold rounded-full bg-yellow-500/20 text-yellow-400 border border-yellow-500/30">SEARCHING</span>
      <span *ngSwitchCase="trackStatuses.Queued" class="inline-block px-3 py-1 text-xs font-bold rounded-full bg-orange-500/20 text-orange-400 border border-orange-500/30">QUEUED</span>
      <span *ngSwitchCase="trackStatuses.Downloading" class="inline-block px-3 py-1 text-xs font-bold rounded-full bg-purple-500/20 text-purple-400 border border-purple-500/30 animate-pulse">DOWNLOADING</span>
      <span *ngSwitchCase="trackStatuses.Completed" class="inline-block px-3 py-1 text-xs font-bold rounded-full bg-spotify-green/20 text-spotify-green border border-spotify-green/30">COMPLETED</span>
      <span *ngSwitchCase="trackStatuses.Error" class="inline-block px-3 py-1 text-xs font-bold rounded-full bg-red-500/20 text-red-400 border border-red-500/30" [title]="track.error">ERROR</span>
    </ng-container>
  </div>
</a>
