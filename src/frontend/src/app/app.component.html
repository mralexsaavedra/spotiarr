<section class="bg-primary text-white">
  <div class="py-12 px-6">
    <p class="text-4xl font-bold">
      <i class="fa-brands fa-spotify"></i>
      <span>Spooty</span>
      <span class="inline-block bg-gray-800 text-white text-xs font-semibold px-2 py-1 rounded ml-2">v{{version}}</span>
    </p>
    <p class="text-xl mt-2">Self-hosted spotify downloader</p>
  </div>
</section>

<section class="bg-gray-50">
  <div class="py-12 px-6">
    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
      <p class="text-xl font-semibold mb-4">Download</p>
      <div class="flex gap-2">
        <input class="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" type="text" [(ngModel)]="url" placeholder="Paste playlist/song/artist url"/>
        <button class="px-6 py-2 bg-primary text-white rounded-md hover:bg-primary-dark transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                [class.opacity-50]="(createLoading$ | async)?.isLoading"
                [class.cursor-wait]="(createLoading$ | async)?.isLoading"
                (click)="download()"
                [disabled]="!url"
        >
          <i class="fa-solid fa-download"></i> Download
        </button>
      </div>
    </div>
    <hr class="my-6 border-gray-300">
    <div class="bg-white rounded-lg shadow-md p-6">
    <div class="flex justify-between items-center mb-4">
      <p class="text-xl font-semibold">Playlists</p>
      <div class="flex gap-2">
        <button class="px-4 py-2 border-2 border-green-500 text-green-500 rounded-md hover:bg-green-50 transition" title="Remove completed from list" (click)="deleteCompleted()">
          <i class="fa-solid fa-check"></i>
        </button>
        <button class="px-4 py-2 border-2 border-red-500 text-red-500 rounded-md hover:bg-red-50 transition" title="Remove failed from list" (click)="deleteFailed()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>
      <app-playlist-box *ngFor="let playlist of playlists$ | async" [playlist]="playlist"></app-playlist-box>
    </div>
  </div>
</section>
