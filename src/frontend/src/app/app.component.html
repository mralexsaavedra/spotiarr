<section class="bg-spotify-black dark:bg-spotify-gray-dark">
  <div class="py-8 px-6">
    <div class="flex justify-between items-center">
      <div>
        <p class="text-4xl font-black text-white flex items-center gap-3">
          <i class="fa-brands fa-spotify text-spotify-green"></i>
          <span class="tracking-tight">SpotiArr</span>
          <span class="inline-block bg-spotify-gray-medium text-spotify-gray-light text-xs font-bold px-3 py-1 rounded-full">v{{version}}</span>
        </p>
        <p class="text-lg mt-3 text-spotify-gray-light font-medium">Your personal Spotify downloader with media server integration</p>
      </div>
      <button 
        (click)="toggleDarkMode()" 
        class="px-4 py-2 rounded-full bg-spotify-gray-medium hover:bg-spotify-gray-medium/80 transition text-white"
        title="Toggle theme"
      >
        <i class="fa-solid" [ngClass]="isDarkMode ? 'fa-sun' : 'fa-moon'"></i>
      </button>
    </div>
  </div>
</section>

<section class="bg-white dark:bg-spotify-gray-dark min-h-screen">
  <div class="py-8 px-6 max-w-7xl mx-auto">
    <div class="bg-gradient-to-br from-spotify-gray-medium to-spotify-black dark:from-spotify-black dark:to-spotify-gray-dark rounded-2xl shadow-2xl p-6 mb-6">
      <p class="text-xl font-bold mb-4 text-white">Download from Spotify</p>
      <div class="flex gap-3">
        <input class="flex-1 px-4 py-3 bg-spotify-gray-dark border-2 border-spotify-gray-medium text-white rounded-full focus:outline-none focus:ring-2 focus:ring-spotify-green focus:border-spotify-green placeholder-spotify-gray-light" 
               type="text" 
               [(ngModel)]="url" 
               (keyup.enter)="download()"
               placeholder="Paste Spotify playlist, album or track URL"/>
        <button class="px-8 py-3 bg-spotify-green text-black font-bold rounded-full hover:bg-spotify-green-light hover:scale-105 transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 flex items-center gap-2 shadow-lg"
                [class.opacity-50]="(createLoading$ | async)?.isLoading"
                [class.cursor-wait]="(createLoading$ | async)?.isLoading"
                (click)="download()"
                [disabled]="!url"
        >
          <i class="fa-solid fa-download"></i>
          <span>Download</span>
        </button>
      </div>
    </div>
    <div class="bg-white dark:bg-spotify-black rounded-2xl shadow-xl p-6">
    <div class="flex justify-between items-center mb-6">
      <p class="text-2xl font-bold text-black dark:text-white">Your Downloads</p>
      <div class="flex gap-3">
        <button class="px-4 py-2 bg-spotify-green/10 border-2 border-spotify-green text-spotify-green font-semibold rounded-full hover:bg-spotify-green hover:text-black transition-all" title="Remove completed from list" (click)="deleteCompleted()">
          <i class="fa-solid fa-check"></i>
        </button>
        <button class="px-4 py-2 bg-red-500/10 border-2 border-red-500 text-red-500 font-semibold rounded-full hover:bg-red-500 hover:text-white transition-all" title="Remove failed from list" (click)="deleteFailed()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>
      <app-playlist-box *ngFor="let playlist of playlists$ | async" [playlist]="playlist"></app-playlist-box>
    </div>
  </div>
</section>
