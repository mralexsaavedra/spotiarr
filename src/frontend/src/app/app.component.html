<section class="bg-primary text-white dark:bg-gray-800">
  <div class="py-12 px-6">
    <div class="flex justify-between items-center">
      <div>
        <p class="text-4xl font-bold">
          <i class="fa-brands fa-spotify"></i>
          <span>Spooty</span>
          <span class="inline-block bg-gray-800 dark:bg-gray-700 text-white text-xs font-semibold px-2 py-1 rounded ml-2">v{{version}}</span>
        </p>
        <p class="text-xl mt-2">Self-hosted spotify downloader</p>
      </div>
      <button 
        (click)="toggleDarkMode()" 
        class="px-4 py-2 rounded-md bg-white/10 hover:bg-white/20 transition"
        title="Toggle dark mode"
      >
        <i class="fa-solid" [ngClass]="isDarkMode ? 'fa-sun' : 'fa-moon'"></i>
      </button>
    </div>
  </div>
</section>

<section class="bg-gray-50 dark:bg-gray-900 min-h-screen">
  <div class="py-12 px-6">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 mb-6">
      <p class="text-xl font-semibold mb-4 dark:text-white">Download</p>
      <div class="flex gap-2">
        <input class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" type="text" [(ngModel)]="url" placeholder="Paste playlist/song/artist url"/>
        <button class="px-6 py-2 bg-primary text-white rounded-md hover:bg-primary-dark transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2"
                [class.opacity-50]="(createLoading$ | async)?.isLoading"
                [class.cursor-wait]="(createLoading$ | async)?.isLoading"
                (click)="download()"
                [disabled]="!url"
        >
          <i class="fa-solid fa-download"></i> Download
        </button>
      </div>
    </div>
    <hr class="my-6 border-gray-300 dark:border-gray-700">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6">
    <div class="flex justify-between items-center mb-4">
      <p class="text-xl font-semibold dark:text-white">Playlists</p>
      <div class="flex gap-2">
        <button class="px-4 py-2 border-2 border-green-500 text-green-500 rounded-md hover:bg-green-50 dark:hover:bg-green-900/20 transition" title="Remove completed from list" (click)="deleteCompleted()">
          <i class="fa-solid fa-check"></i>
        </button>
        <button class="px-4 py-2 border-2 border-red-500 text-red-500 rounded-md hover:bg-red-50 dark:hover:bg-red-900/20 transition" title="Remove failed from list" (click)="deleteFailed()">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
    </div>
      <app-playlist-box *ngFor="let playlist of playlists$ | async" [playlist]="playlist"></app-playlist-box>
    </div>
  </div>
</section>
