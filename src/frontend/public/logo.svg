<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spotifyGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1ed760;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1DB954;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Spotify Circle -->
  <circle cx="100" cy="100" r="90" fill="url(#spotifyGreen)"/>
  
  <!-- Spotify-style curved lines -->
  <g stroke="#191414" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.95">
    <!-- Top curve -->
    <path d="M 50 70 Q 100 55, 150 70"/>
    
    <!-- Middle curve -->
    <path d="M 55 95 Q 100 82, 145 95"/>
    
    <!-- Bottom curve -->
    <path d="M 60 120 Q 100 109, 140 120"/>
  </g>
  
  <!-- *ARR Badge -->
  <g>
    <!-- Badge background -->
    <rect x="115" y="140" width="70" height="35" rx="17.5" fill="#191414" opacity="0.95"/>
    <rect x="117" y="142" width="66" height="31" rx="15.5" fill="#2196F3"/>
    
    <!-- *ARR Text -->
    <text x="150" y="164" 
          font-family="Arial, sans-serif" 
          font-size="18" 
          font-weight="bold" 
          fill="#ffffff" 
          text-anchor="middle">*ARR</text>
  </g>
</svg>
